<svg viewBox="0 0 760 420" xmlns="http://www.w3.org/2000/svg" font-family="'Cascadia Code', 'Fira Code', 'Consolas', monospace">
  <defs>
    <linearGradient id="termBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1d23"/>
      <stop offset="100%" stop-color="#13151a"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1e2128"/>
      <stop offset="100%" stop-color="#22252e"/>
    </linearGradient>
    <linearGradient id="successGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0d2818" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#0d2818" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="termShadow">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <style>
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      .cursor { animation: blink 1.1s step-end infinite; }
      @keyframes fadeSlide {
        from { opacity: 0; transform: translateY(4px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .line1 { animation: fadeSlide 0.3s ease 0.2s both; }
      .line2 { animation: fadeSlide 0.3s ease 0.6s both; }
      .line3 { animation: fadeSlide 0.3s ease 1.0s both; }
      .line4 { animation: fadeSlide 0.3s ease 1.4s both; }
      .line5 { animation: fadeSlide 0.3s ease 1.8s both; }
      .line6 { animation: fadeSlide 0.3s ease 2.2s both; }
      .line7 { animation: fadeSlide 0.3s ease 2.6s both; }
      .line8 { animation: fadeSlide 0.3s ease 3.0s both; }
      .line9 { animation: fadeSlide 0.3s ease 3.4s both; }
      .line10 { animation: fadeSlide 0.3s ease 3.8s both; }
      .line11 { animation: fadeSlide 0.3s ease 4.2s both; }
    </style>
  </defs>

  <!-- Window shadow -->
  <rect x="20" y="20" width="720" height="380" rx="10" fill="#000" opacity="0.4" filter="url(#termShadow)"/>

  <!-- Terminal window -->
  <rect x="20" y="20" width="720" height="380" rx="10" fill="url(#termBg)"/>

  <!-- Title bar -->
  <rect x="20" y="20" width="720" height="36" rx="10" fill="url(#headerGrad)"/>
  <rect x="20" y="44" width="720" height="12" fill="url(#headerGrad)"/>

  <!-- Traffic lights -->
  <circle cx="48" cy="38" r="6" fill="#ff5f57"/>
  <circle cx="68" cy="38" r="6" fill="#febc2e"/>
  <circle cx="88" cy="38" r="6" fill="#28c840"/>

  <!-- Title -->
  <text x="380" y="43" text-anchor="middle" font-size="12" fill="#6b7280" letter-spacing="0.5">Claude Code — dotnet-pilot install</text>

  <!-- Divider -->
  <line x1="20" y1="56" x2="740" y2="56" stroke="#2a2d36" stroke-width="1"/>

  <!-- Terminal content area -->
  <g transform="translate(40, 80)" font-size="13.5" fill="#d4d4d4">

    <!-- Step 1: marketplace add -->
    <g class="line1">
      <text y="0" fill="#4ec9b0">●</text>
      <text x="18" y="0" fill="#888">step 1 — add marketplace source</text>
    </g>

    <g class="line2">
      <text y="24" fill="#569cd6">/</text>
      <text x="10" y="24" fill="#9cdcfe">plugin</text>
      <text x="62" y="24" fill="#d4d4d4">marketplace add</text>
      <text x="208" y="24" fill="#ce9178">zdanovichnick/dotnet-pilot</text>
    </g>

    <g class="line3">
      <text x="18" y="46" fill="#6a9955">✓  Marketplace "dotnet-pilot-marketplace" added</text>
    </g>

    <!-- Step 2: plugin install -->
    <g class="line4">
      <text y="78" fill="#4ec9b0">●</text>
      <text x="18" y="78" fill="#888">step 2 — install the plugin</text>
    </g>

    <g class="line5">
      <text y="102" fill="#569cd6">/</text>
      <text x="10" y="102" fill="#9cdcfe">plugin</text>
      <text x="62" y="102" fill="#d4d4d4">install</text>
      <text x="116" y="102" fill="#ce9178">dotnet-pilot@dotnet-pilot-marketplace</text>
    </g>

    <g class="line6">
      <text x="18" y="124" fill="#6a9955">✓  Fetching plugin from zdanovichnick/dotnet-pilot ...</text>
    </g>
    <g class="line7">
      <text x="18" y="143" fill="#6a9955">✓  Plugin "dotnet-pilot" v1.1.0 installed (21 commands · 8 agents · 5 hooks)</text>
    </g>

    <!-- Step 3: reload -->
    <g class="line8">
      <text y="175" fill="#4ec9b0">●</text>
      <text x="18" y="175" fill="#888">step 3 — activate</text>
    </g>

    <g class="line9">
      <text y="199" fill="#569cd6">/</text>
      <text x="10" y="199" fill="#9cdcfe">reload-plugins</text>
    </g>

    <!-- Success block -->
    <g class="line10">
      <rect x="0" y="215" width="680" height="54" rx="5" fill="url(#successGrad)" stroke="#1a4731" stroke-width="1"/>
      <text x="14" y="234" fill="#4ec9b0" font-size="13">✓  DotnetPilot active</text>
      <text x="14" y="252" fill="#6a9955" font-size="12">   /DotnetPilot:utility:help → 21 commands listed</text>
      <text x="400" y="252" fill="#6a9955" font-size="12">/DotnetPilot:dotnet:check-solution → ready</text>
    </g>

    <!-- Cursor prompt -->
    <g class="line11">
      <text y="290" fill="#4ec9b0">❯</text>
      <rect x="18" y="277" width="8" height="16" rx="1" fill="#569cd6" class="cursor"/>
    </g>

  </g>

  <!-- Corner badge -->
  <rect x="596" y="28" width="128" height="20" rx="10" fill="#1a2a1a" stroke="#28c840" stroke-width="0.75"/>
  <circle cx="613" cy="38" r="3.5" fill="#28c840" filter="url(#glow)"/>
  <text x="622" y="42" font-family="'Cascadia Code', monospace" font-size="10.5" fill="#28c840">v1.1.0  installed</text>
</svg>
